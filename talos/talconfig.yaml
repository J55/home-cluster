---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://k8s.internal:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "k8s.internal"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "rpileader0"
    ipAddress: "192.168.20.20"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/f8a903f101ce10f686476024898734bb6b36353cc4d41f348514db9004ec0a9d
    controlPlane: true
  - hostname: "rpileader1"
    ipAddress: "192.168.20.21"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/f8a903f101ce10f686476024898734bb6b36353cc4d41f348514db9004ec0a9d
    controlPlane: true
  - hostname: "rpileader2"
    ipAddress: "192.168.20.22"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/f8a903f101ce10f686476024898734bb6b36353cc4d41f348514db9004ec0a9d
    controlPlane: true
  - hostname: "rpinode0"
    ipAddress: "192.168.20.30"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/f8a903f101ce10f686476024898734bb6b36353cc4d41f348514db9004ec0a9d
    controlPlane: false
  - hostname: "rpinode1"
    ipAddress: "192.168.20.31"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/f8a903f101ce10f686476024898734bb6b36353cc4d41f348514db9004ec0a9d
    controlPlane: false
  - hostname: "rpinode2"
    ipAddress: "192.168.20.32"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/f8a903f101ce10f686476024898734bb6b36353cc4d41f348514db9004ec0a9d
    controlPlane: false
  - hostname: "nucnode0"
    ipAddress: "192.168.20.33"
    installDisk: "/dev/nvme1n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/8d37fcc01bb9173406853e7fd97ad9eda40732043f88e09dafe55e53fcf4b510
    controlPlane: false
    patches:
      - "@./patches/nuc-common.yaml"
      - "@./patches/nucnode0/network.yaml"
      - "@./patches/nucnode0/volumes.yaml"
  - hostname: "nucnode1"
    ipAddress: "192.168.20.34"
    installDisk: "/dev/nvme1n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/8d37fcc01bb9173406853e7fd97ad9eda40732043f88e09dafe55e53fcf4b510
    controlPlane: false
    patches:
      - "@./patches/nuc-common.yaml"
      - "@./patches/nucnode1/network.yaml"
      - "@./patches/nucnode1/volumes.yaml"
  - hostname: "nucnode2"
    ipAddress: "192.168.20.35"
    installDisk: "/dev/nvme1n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/8d37fcc01bb9173406853e7fd97ad9eda40732043f88e09dafe55e53fcf4b510
    controlPlane: false
    patches:
      - "@./patches/nuc-common.yaml"
      - "@./patches/nucnode2/network.yaml"
      - "@./patches/nucnode2/volumes.yaml"

# Global patches
patches:
  - "@./patches/global/machine-bond.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/volumes.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/machine.yaml"
    - "@./patches/controller/network.yaml"

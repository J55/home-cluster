---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: synology-raid-system-volumes
spec:
  matchers:
    - name: alertname
      value: NodeRAIDDegraded
    - name: instance
      value: galactus.internal:9100
    - name: device
      value: md[01]
      matchType: "=~"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: victoria-metrics-kube-scheduler
spec:
  matchers:
    - name: alertname
      value: RecordingRulesNoData
    - name: recording
      value: cluster_quantile:scheduler_.*
      matchType: "=~"

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nut-exporter
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/instance: nut-exporter
    app.kubernetes.io/name: nut-exporter
spec:
  jobLabel: nut-exporter
  namespaceSelector:
    matchNames:
      - observability
  selector:
    matchLabels:
      app.kubernetes.io/instance: nut-exporter
      app.kubernetes.io/name: nut-exporter
  endpoints:
    - interval: 60s
      path: /ups_metrics
      port: metrics
      scheme: http
      scrapeTimeout: 30s
      params:
        server: ["nas.internal"]
        ups: ["ups"]
      metricRelabelings:
        - action: replace
          replacement: ups
          sourceLabels: [instance]
          targetLabel: instance
        - action: replace
          replacement: nas.internal
          sourceLabels: [server]
          targetLabel: server
        - action: labeldrop
          regex: pod

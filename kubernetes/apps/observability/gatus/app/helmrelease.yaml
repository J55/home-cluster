---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  chartRef:
    kind: OCIRepository
    name: gatus
  interval: 1h
  values:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      env:
        TZ: America/New_York
      delayStartSeconds: 5
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true
          auto: false
    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 5Gi
    monitoring:
      serviceMonitor:
        enabled: true
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/icon: gatus.png
        gethomepage.dev/name: Status
        gethomepage.dev/group: Infrastructure
        gethomepage.dev/href: "https://status.${SECRET_DOMAIN}"
        gethomepage.dev/widget.type: gatus
        gethomepage.dev/widget.url: http://gatus.observability.svc.cluster.local
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - "gatus.${SECRET_DOMAIN}"
        - "status.${SECRET_DOMAIN}"

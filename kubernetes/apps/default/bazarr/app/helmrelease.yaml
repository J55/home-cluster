---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
spec:
  chartRef:
    kind: OCIRepository
    name: bazarr
  interval: 1h
  values:
    controllers:
      bazarr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          patch-migrations:
            image:
              repository: ghcr.io/home-operations/bazarr
              tag: 1.6.0@sha256:cd63bbd0986c93e238eb8b9442604d249f0d4080099b389f822abe2062044417
            command:
              - /bin/sh
              - -c
            args:
              - |
                cp -r /app/bin/migrations/versions/. /migrations-patch/
                chmod -R 755 /migrations-patch/
                sed -i 's/bind = op.get_context().bind//' /migrations-patch/7e9a2b1c4d5f_.py
                sed -i 's/insp = sa.inspect(bind)//' /migrations-patch/7e9a2b1c4d5f_.py
                sed -i 's/    columns = insp.get_columns(table_name)/    insp = sa.inspect(op.get_bind())\n    columns = insp.get_columns(table_name)/' /migrations-patch/7e9a2b1c4d5f_.py
                sed -i 's/bind = op.get_context().bind//' /migrations-patch/0124f9e278fb_.py
                sed -i 's/def upgrade():/def upgrade():\n    bind = op.get_bind()/' /migrations-patch/0124f9e278fb_.py
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              runAsGroup: 0
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/bazarr
              tag: 1.6.0@sha256:cd63bbd0986c93e238eb8b9442604d249f0d4080099b389f822abe2062044417
            env:
              BAZARR__PORT: &port 80
              TZ: America/New_York
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/system/ping
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: bazarr.png
          gethomepage.dev/name: Bazarr
          gethomepage.dev/group: Downloads
          gethomepage.dev/description: Subtitles
          gethomepage.dev/widget.type: bazarr
          gethomepage.dev/widget.url: http://bazarr.default.svc.cluster.local
          gethomepage.dev/widget.key: '{{ "{{HOMEPAGE_VAR_BAZARR_API_KEY}}" }}'
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: galactus.internal
        path: /volume1/Media
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
      migrations:
        type: emptyDir
        advancedMounts:
          bazarr:
            patch-migrations:
              - path: /migrations-patch
            app:
              - path: /app/bin/migrations/versions

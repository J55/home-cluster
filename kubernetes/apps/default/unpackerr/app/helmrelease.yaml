---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpackerr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: unpackerr
  maxHistory: 2
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      unpackerr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/unpackerr/unpackerr
              tag: 0.14.5
            env:
              TZ: America/New_York
              UN_WEBSERVER_METRICS: "true"
              UN_SONARR_0_URL: https://sonarr.${SECRET_DOMAIN}
              UN_SONARR_0_PATHS_0: /complete/tv
              UN_RADARR_0_URL: https://radarr.${SECRET_DOMAIN}
              UN_RADARR_0_PATHS_0: /complete/movies
            envFrom:
              - secretRef:
                  name: unpackerr-secret
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 65539
    service:
      app:
        controller: unpackerr
        ports:
          http:
            port: 5656
    persistence:
      data:
        type: nfs
        server: galactus.internal
        path: /volume1/Media/Downloads/Torrents/Complete
        globalMounts:
          - path: /complete
    serviceMonitor:
      app:
        serviceName: unpackerr
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

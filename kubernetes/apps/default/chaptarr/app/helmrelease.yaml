---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaptarr
spec:
  chartRef:
    kind: OCIRepository
    name: chaptarr
  interval: 1h
  values:
    controllers:
      chaptarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/robertlordhood/chaptarr
              tag: develop@sha256:de19b35cb769609b61b39125ba8c040c38b3074852896bbb6dfc44a9a9da46ba
            env:
              TZ: America/New_York
              CHAPTARR__APP__INSTANCENAME: Chaptarr
              CHAPTARR__APPLICATION_URL: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              CHAPTARR__APP__THEME: dark
              CHAPTARR__AUTH__METHOD: Forms
              CHAPTARR__AUTH__REQUIRED: DisabledForLocalAddresses
              CHAPTARR__LOG__DBENABLED: "False"
              CHAPTARR__LOG__LEVEL: info
              CHAPTARR__SERVER__PORT: &port 8789
              CHAPTARR__UPDATE__BRANCH: develop
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: galactus.internal
        path: /volume1/Media
        globalMounts:
          - path: /media
      run:
        type: emptyDir
        globalMounts:
          - path: /run
      tmp:
        type: emptyDir

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    gateway: true
    ingress: false
    traefik: false
  settings.yaml: |
    # https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/ICONS.md
    # https://pictogrammers.com/library/mdi/
    # https://simpleicons.org/
    title: Dashboard
    favicon: https://github.com/walkxcode/dashboard-icons/blob/main/png/heimdall.png
    theme: dark
    headerStyle: clean
    hideVersion: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: true
      showSearchSuggestions: true
    layout:
      Home:
        style: row
        columns: 2
        icon: mdi-home-analytics
      Infrastructure:
        style: column
        icon: mdi-server-network
      Observability:
        style: column
        icon: mdi-monitor-eye
      Storage:
        style: column
        icon: mdi-database
      System:
        style: row
        columns: 4
        icon: mdi-application
      Media:
        style: row
        columns: 3
        icon: mdi-play-circle
      Downloads:
        style: row
        columns: 4
        icon: mdi-download-circle
      Calendar:
        style: row
        header: false
      Settings:
        style: row
        columns: 3
        icon: mdi-cogs
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Social:
        - Discord:
            - icon: discord.png
              href: https://discord.com/app
        - Gmail:
            - icon: gmail.png
              href: http://gmail.com
        - Reddit:
            - icon: reddit.png
              href: https://reddit.com
        - YouTube:
            - icon: youtube.png
              href: https://youtube.com/feed/subscriptions
    - Cloud:
        - CloudFlare:
            - icon: cloudflare.png
              href: https://dash.cloudflare.com
        - Pushover:
            - icon: pushover.png
              href: https://client.pushover.net/
        - UptimeRobot:
            - icon: si-statuspage
              href: https://uptimerobot.com/
        - HealthChecks:
            - icon: healthchecks.png
              href: https://healthcheck.io/
    - Git:
        - Kubesearch:
            - icon: kubernetes-dashboard.png
              description: Helm Chart Search
              href: https://nanne.dev/k8s-at-home-search/
        - home-cluster:
            - icon: github.png
              description: Renovate Dashboard
              href: https://github.com/J55/home-cluster/issues/44
        - Homepage Icons:
            - icon: si-jpeg
              href: https://dashboardicons.com
        - Homepage MDI:
            - icon: si-materialdesign
              href: https://pictogrammers.com/library/mdi/
        - Homepage SI:
            - icon: si-simpleicons
              href: https://simpleicons.org/
  services.yaml: |
    - Calendar:
        - Calendar:
            widget:
              type: calendar
              firstDayInWeek: monday
              view: monthly
              maxEvents: 10
              showTime: true
              timezone: America/New_York
              integrations:
                - type: sonarr
                  service_group: Downloads
                  service_name: Sonarr
                - type: radarr
                  service_group: Downloads
                  service_name: Radarr
    - Infrastructure:
        - Portainer:
            href: https://portainer.{{HOMEPAGE_VAR_SECRET_DOMAIN}}
            icon: portainer.png
            widget:
              type: portainer
              url: https://portainer.{{HOMEPAGE_VAR_SECRET_DOMAIN}}
              env: 3
              key: {{HOMEPAGE_VAR_PORTAINER_TOKEN}}
    - Downloads:
    - System:
        - Adguard:
            href: http://adguard.internal
            icon: adguard-home.png
            widget:
              type: adguard
              url: http://adguard.internal
              username: {{HOMEPAGE_VAR_ADGUARD_USERNAME}}
              password: {{HOMEPAGE_VAR_ADGUARD_PASSWORD}}
        - Unifi:
            href: https://unifi.internal
            icon: unifi.png
            widget:
              type: unifi
              url: https://unifi.internal
              key: {{HOMEPAGE_VAR_UNIFI_API_KEY}}
        - Synology:
            href: https://nas.internal:5001
            icon: synology.png
            widget:
              type: diskstation
              url: https://nas.internal:5001
              username: {{HOMEPAGE_VAR_SYNOLOGY_USERNAME}}
              password: {{HOMEPAGE_VAR_SYNOLOGY_PASSWORD}}
        - Cloudflared:
            href: https://dash.cloudflare.com/
            icon: cloudflare-zero-trust.png
            description: Cloudflared Tunnel
            widget:
              type: cloudflared
              accountid: {{HOMEPAGE_VAR_CLOUDFLARE_ACCOUNTID}}
              tunnelid: {{HOMEPAGE_VAR_CLOUDFLARE_TUNNELID}}
              key: {{HOMEPAGE_VAR_CLOUDFLARE_API_TOKEN}}
  widgets.yaml: |
    - search:
        provider: [google]
        focus: false
        target: _blank
    - kubernetes:
        cluster:
          cpu: true
          label: cluster
          memory: true
          show: true
          showLabel: true
        nodes:
          cpu: true
          memory: true
          show: true
          showLabel: true
    - openmeteo:
        label: Home
        latitude: {{HOMEPAGE_VAR_LATITUDE}}
        longitude: {{HOMEPAGE_VAR_LONGITUDE}}
        units: imperial
        cache: 5
    - datetime:
        text_size: 1
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23
  docker.yaml: ""
